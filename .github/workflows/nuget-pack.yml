name: Pack NuGet

on:
  push:
    tags:
      - "v*"
    branches:
      - "master"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g., 1.2.3)"
        required: false
      publish:
        description: "Publish packages to NuGet.org"
        type: boolean
        default: false

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine package version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # Manual input overrides everything
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            # Git tag: v1.2.3 → 1.2.3
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            # Auto-increment: read major.minor from csproj, use run number as patch
            BASE_VERSION=$(grep -oP '(?<=<Version>)\d+\.\d+' src/ShadCn.Blazor.Components/ShadCn.Blazor.Components.csproj || echo "1.0")
            echo "value=${BASE_VERSION}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi
          echo "Package version: $(grep 'value=' "$GITHUB_OUTPUT" | tail -1)"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Pack Theme.Default
        run: dotnet pack src/ShadCn.Blazor.Theme.Default/ShadCn.Blazor.Theme.Default.csproj -c Release --no-build -o artifacts -p:PackageVersion=${{ steps.version.outputs.value }} -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Pack Components
        run: dotnet pack src/ShadCn.Blazor.Components/ShadCn.Blazor.Components.csproj -c Release --no-build -o artifacts -p:PackageVersion=${{ steps.version.outputs.value }} -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      - name: Publish to NuGet.org
        if: ${{ github.ref == 'refs/heads/master' }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY is not set. Add the repository secret or disable publish."
            exit 1
          fi
          dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
