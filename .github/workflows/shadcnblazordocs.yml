name: Build and deploy .NET application to container app shadcnblazordocs
on:
  push:
    branches:
    - master
permissions:
  id-token: write
  contents: read
env:
  CONTAINER_APP_CONTAINER_NAME: shadcnblazordocs
  CONTAINER_APP_NAME: shadcnblazordocs
  CONTAINER_APP_RESOURCE_GROUP_NAME: docs-rg
  CONTAINER_REGISTRY_LOGIN_SERVER: adocka.azurecr.io
  DOTNET_CORE_VERSION: 10.0.x
  PROJECT_NAME_FOR_DOCKER: shadcn.blazor.docs
  WORKING_DIRECTORY: src/ShadCn.Blazor.Docs
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout to the branch
      uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-quality: preview
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
    - name: Install wasm-tools workload
      run: dotnet workload install wasm-tools
    - name: Log in to container registry
      uses: azure/docker-login@v2
      with:
        login-server: ${{ env.CONTAINER_REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.adocka_USERNAME_647F }}
        password: ${{ secrets.adocka_PASSWORD_647F }}
    - name: Build and push container image to registry
      run: dotnet publish "${{ env.WORKING_DIRECTORY }}" -c Release -r linux-x64 -p:PublishProfile=DefaultContainer -p:ContainerImageTag=${{ github.sha }} --no-self-contained -p:ContainerRegistry=${{ env.CONTAINER_REGISTRY_LOGIN_SERVER }} -bl
    - name: Upload binlog for investigation
      uses: actions/upload-artifact@v4
      with:
        if-no-files-found: error
        name: binlog
        path: msbuild.binlog
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ vars.shadcnblazordocs_CLIENT_ID_647F }}
        tenant-id: ${{ vars.shadcnblazordocs_TENANT_ID_647F }}
        subscription-id: ${{ vars.shadcnblazordocs_SUBSCRIPTION_ID_647F }}
    - name: Deploy to containerapp
      uses: azure/CLI@v2
      with:
        inlineScript: >
          az config set extension.use_dynamic_install=yes_without_prompt

          az containerapp registry set --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.CONTAINER_APP_RESOURCE_GROUP_NAME }} --server ${{ env.CONTAINER_REGISTRY_LOGIN_SERVER }} --username ${{ secrets.adocka_USERNAME_647F }} --password ${{ secrets.adocka_PASSWORD_647F }}

          az containerapp update --name ${{ env.CONTAINER_APP_NAME }} --container-name ${{ env.CONTAINER_APP_CONTAINER_NAME }} --resource-group ${{ env.CONTAINER_APP_RESOURCE_GROUP_NAME }} --image ${{ env.CONTAINER_REGISTRY_LOGIN_SERVER }}/${{ env.PROJECT_NAME_FOR_DOCKER }}:${{ github.sha }}
    - name: logout
      run: >
        az logout
